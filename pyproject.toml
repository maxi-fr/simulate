[project]
name = "simulate"
version = "0.1.0"
description = "Simulation framework for control systems"
authors = [
    {name = "Max Frankenberg", email = "frankenbergmax57@gmail.com"}
]
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "ipython>=9.13.0",
    "matplotlib>=3.10.9",
    "numpy>=2.4.4",
    "pandas>=3.0.2",
    "pandas-stubs>=3.0.0.260204",
    "pydantic>=2.13.4",
    "pyyaml>=6.0.3",
    "types-pyyaml>=6.0.12.20260508",
]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0", # Added for coverage reporting
    "ruff>=0.3.0",
    "pre-commit>=3.0.0",
    "mypy>=1.0.0",
    "validate-pyproject>=0.23",
    "nbmake>=1.5.5",
]

[build-system]
requires = ["uv_build>=0.10.8,<0.12"]
build-backend = "uv_build"

[tool.uv]
default-groups = ["dev"]

[tool.ruff]
line-length = 120
target-version = "py313"

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "E501",   # line too long (handled by formatter)
    "FIX",    # for comments like TODO, FIXME
    "TD",     # for structure of TODO comments
    "D100",   # Missing docstring in public module
    "D104",   # Missing docstring in public package
    "COM812", # Trailing comma missing (conflicts with formatter)
    "ISC001", # Single line implicit string concatenation (conflicts with formatter)
]

[tool.ruff.lint.isort]
# Ensures imports are grouped logically
known-first-party = ["simulate"]

[tool.ruff.lint.pydocstyle]
convention = "numpy"

[tool.ruff.lint.per-file-ignores]
"tests/*" = [
    "S101",    # assert
    "PLR0913", # too-many-arguments
    "F401",    # unused import
    "ARG001",  # Unused function args (fixtures)
    "PLR2004", # Magic value used in comparison
    "D",       # Ignore docstrings in tests
    "INP001",  # No __init__.py in tests folder
]
"examples/*" = ["INP001"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
# Usually, keeping the comma helps with cleaner diffs in git
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.pytest.ini_options]
minversion = "6.0"
# Added -v for more detail and --cov to integrate coverage
addopts = "-ra -q -v --cov=simulate"
testpaths = ["tests"]

[tool.mypy]
python_version = "3.13"
# --- The Meta Flag (for any new added flags which fall under strict) ---
strict = true

# --- 1. Disallow Dynamic Typing ---
disallow_any_generics = false      # e.g., List instead of List[int]
disallow_subclassing_any = true   # Prevents inheriting from a class typed as 'Any'

# --- 2. Untyped Definitions & Calls ---
disallow_untyped_calls = true     # Prevents calling a function without type hints
disallow_untyped_defs = true      # Forces function signatures to have hints (Args + Return)
disallow_incomplete_defs = true   # Prevents partial hints (e.g., hinting args but not return)
check_untyped_defs = true         # Look inside functions even if they don't have hints
disallow_untyped_decorators = true # Ensures decorators are typed

# --- 3. None and Optional Handling ---
no_implicit_optional = true       # Prevents 'x: str = None' (must be 'Optional[str]')

# --- 4. Configuring Warnings ---
warn_redundant_casts = true       # Warns if you cast something to its own type
warn_unused_ignores = true        # Warns if a '# type: ignore' isn't needed anymore
warn_return_any = true            # Warns if a function returns 'Any' when hinted otherwise
warn_unreachable = true           # Warns about code that can never run

# --- 5. Miscellaneous Strictness ---
no_implicit_reexport = true       # Prevents access to 'from x import y' unless 'y' is in x's __all__
strict_equality = true            # Prevents 'x == y' if types are fundamentally incompatible
strict_optional = true            # (On by default anyway) Handle 'None' strictly

# Not part of strict = true
# --- 6. Quality of Life / Reporting ---
show_error_codes = true           # Shows [error-code] for easy ignoring
pretty = true                     # Colorized output and context markers
show_column_numbers = true        # Better precision in error reports
warn_unused_configs = true        # Alerts you if a config line isn't doing anything

# --- 7. Handling Dependencies ---
ignore_missing_imports = false     # Don't error on libs without stubs (e.g. pandas)
follow_imports = "normal"         # How to follow imports ("silent", "normal", "error")
