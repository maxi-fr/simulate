t_end: 10.0

dynamics:
  class_path: spacecraft.rigid_body.RigidBodyDynamics
  dt: 0.01
  mass: 1.5
  inertia: [0.015, 0.015, 0.03]
  effectors:
    - class_path: examples.02_quadrocopter.quadrocopter.Quadrocopter
      rotor_positions: [[0.2, 0.2, 0.0], [-0.2, -0.2, 0.0], [0.2, -0.2, 0.0], [-0.2, 0.2, 0.0]]
      rotor_directions: [-1, -1, 1, 1]
      torque_to_thrust_ratio: 0.015
      thrust_axis: [0.0, 0.0, 1.0]
    - class_path: examples.02_quadrocopter.quadrocopter.FlatGravity
      gravity_acceleration: [0.0, 0.0, -9.81]

reference:
  class_path: simulate.reference.StepReference
  dt: 0.01
  step_value: [1.0, 1.0, 1.0]
  start_time: 1.0

estimator:
  class_path: simulate.estimator.IdentityEstimator
  dt: 0.01

sensors:
  - class_path: simulate.sensor.GaussianSensor
    dt: 0.01
    std_dev: 0.0
    measurement:
      class_path: simulate.sensor.full_state_measurement

controller:
  class_path: examples.02_quadrocopter.quadrocopter.CascadedController
  dt: 0.01
  mass: 1.5
  inertia: [0.015, 0.015, 0.03]
  k_p_pos: [2.0, 2.0, 2.0]
  k_d_pos: [2.0, 2.0, 2.0]
  k_p_att: [50.0, 50.0, 50.0]
  k_d_att: [10.0, 10.0, 10.0]
